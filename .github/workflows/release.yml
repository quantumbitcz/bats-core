name: Release

on:
  release: { types: [published] }
  workflow_dispatch:

permissions:
  contents: read

jobs:
  npmjs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          registry-url: "https://registry.npmjs.org"
      - run: bun publish
        env:
          BUN_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  github-npm:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          registry-url: "https://npm.pkg.github.com"
      - name: scope package name as required by GitHub Packages
        run: |
          PKG=$(jq -r '.name' package.json)
          jq --arg n "@${{ github.repository_owner }}/$PKG" '.name = $n' package.json > tmp.json && mv tmp.json package.json
      - run: bun publish
        env:
          BUN_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
